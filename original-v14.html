<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bumper Pool — Justin vs Morpheus</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#1a1a2e; display:flex; flex-direction:column; align-items:center;
    min-height:100vh; font-family:'Georgia',serif; color:#f0e6d3; padding:8px;
    -webkit-user-select:none; user-select:none;
  }
  h1 { font-size:1.2em; letter-spacing:2px; text-transform:uppercase; color:#c9a84c; margin-bottom:5px; }
  #lobby {
    background:rgba(0,0,0,0.5); border:1px solid #c9a84c44; border-radius:10px;
    padding:20px; text-align:center; max-width:340px; width:100%;
  }
  #lobby h2 { color:#c9a84c; font-size:1.1em; margin-bottom:12px; }
  .lobby-btn {
    background:#c9a84c; color:#1a1a2e; border:none; padding:10px 24px;
    font-size:0.95em; font-family:'Georgia',serif; text-transform:uppercase;
    letter-spacing:1px; border-radius:4px; cursor:pointer; font-weight:bold;
    margin:6px; display:inline-block;
  }
  .lobby-btn:hover { background:#e0c070; }
  .lobby-btn:disabled { background:#555; color:#888; cursor:default; }
  #room-code {
    font-size:1.8em; color:#c9a84c; letter-spacing:6px; font-weight:bold;
    margin:10px 0; font-family:monospace;
  }
  #join-input {
    background:#222; border:2px solid #c9a84c; color:#f0e6d3; padding:8px 12px;
    font-size:1.2em; font-family:monospace; text-align:center; width:160px;
    border-radius:4px; letter-spacing:4px; text-transform:uppercase;
  }
  #status-msg { color:#999; font-size:0.8em; margin-top:8px; min-height:18px; }
  #game { display:none; }
  #scoreboard {
    display:flex; gap:16px; margin-bottom:6px;
    background:rgba(0,0,0,0.4); padding:6px 16px; border-radius:8px;
    border:1px solid #c9a84c44; align-items:center;
  }
  .pi { text-align:center; min-width:80px; }
  .pn { font-size:0.9em; font-weight:bold; text-transform:uppercase; letter-spacing:1px; }
  .pn.red { color:#e05555; } .pn.wht { color:#ccc; }
  .bd { font-size:1em; margin-top:1px; }
  #tb { text-align:center; min-width:110px; }
  #ti { font-size:0.82em; color:#c9a84c; }
  #pm { font-size:0.68em; color:#999; margin-top:2px; min-height:12px; }
  #you-are { font-size:0.7em; color:#c9a84c88; margin-bottom:4px; }
  canvas { border-radius:6px; cursor:crosshair; touch-action:none; max-width:100%; }
  #ins { font-size:0.68em; color:#555; margin-top:5px; text-align:center; }
  #ov {
    display:none; position:fixed; top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.88); flex-direction:column; align-items:center;
    justify-content:center; z-index:10;
  }
  #ov.show { display:flex; }
  #wt { font-size:2em; color:#c9a84c; text-shadow:0 0 20px rgba(201,168,76,0.8); margin-bottom:16px; text-align:center; }
  #rb {
    background:#c9a84c; color:#1a1a2e; border:none; padding:10px 28px;
    font-size:1em; font-family:'Georgia',serif; text-transform:uppercase;
    letter-spacing:2px; border-radius:4px; cursor:pointer; font-weight:bold;
  }
</style>
</head>
<body>
<h1>⚫ Bumper Pool ⚫</h1>

<!-- LOBBY -->
<div id="lobby">
  <h2>MULTIPLAYER</h2>
  <div id="lobby-menu">
    <button class="lobby-btn" onclick="createGame()">Create Game</button><br>
    <input id="join-input" placeholder="CODE" maxlength="4"><br>
    <button class="lobby-btn" onclick="joinGame()">Join Game</button>
  </div>
  <div id="lobby-waiting" style="display:none">
    <div>Share this link:</div>
    <div id="room-code" style="font-size:1.2em;letter-spacing:2px;">----</div>
    <button class="lobby-btn" id="copy-btn" onclick="copyLink()" style="font-size:0.8em;padding:6px 16px;">📋 Copy Link</button>
    <button class="lobby-btn" id="share-btn" onclick="shareLink()" style="font-size:0.8em;padding:6px 16px;">📤 Share</button>
    <div id="status-msg">Waiting for opponent...</div>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div id="you-are"></div>
  <div id="scoreboard">
    <div class="pi"><div class="pn red">Justin 🔴</div><div class="bd" id="jd">●●●●●</div></div>
    <div id="tb"><div id="ti">—</div><div id="pm"></div></div>
    <div class="pi"><div class="pn wht">Morpheus ⚪</div><div class="bd" id="md">●●●●●</div></div>
  </div>
  <canvas id="c" width="400" height="680"></canvas>
  <div id="ins">Tap your ball · Drag to aim · Release to shoot</div>
</div>
<div id="ov"><div id="wt"></div><button id="rb" onclick="requestRematch()">Play Again</button></div>

<script>
// Full game code from original v14...
// [preserved in original-v14.html for reference]
</script>
</body></html>
